<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>限俗小助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      width: 300px;
      padding: 20px;
      background-color: #ffffff;
      color: #333;
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: #3A8BFF;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      color: #666;
    }

    .features {
      border-top: 1px solid #e0e0e0;
      padding-top: 15px;
    }

    .feature-item {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
      font-size: 13px;
    }

    .feature-icon {
      width: 20px;
      height: 20px;
      margin-right: 10px;
      background-color: #3A8BFF;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 12px;
    }

    .footer {
      margin-top: 20px;
      padding-top: 15px;
      border-top: 1px solid #e0e0e0;
      text-align: center;
    }

    .footer p {
      font-size: 11px;
      color: #999;
    }

    .version {
      margin-top: 5px;
      font-size: 10px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>限俗小助手</h1>
    <p>超星学习通浏览器插件</p>
  </div>

  <div class="features">
    <div class="feature-item">
      <div class="feature-icon">1</div>
      <span>解决英文内容不按空格换行问题</span>
    </div>
    <div class="feature-item">
      <div class="feature-icon">2</div>
      <span>活动列表增加了克隆活动按钮</span>
    </div>
    <div class="feature-item">
      <div class="feature-icon">3</div>
      <span>展开/收起所有活动列表</span>
    </div>
  </div>

  <div class="footer">
    <p>仅在超星学习通网站生效</p>
    <p class="version">版本 1.0 | © 袁芳芳 yffyeah<at>hotmail.com</p>
  </div>
</body>
</html>
